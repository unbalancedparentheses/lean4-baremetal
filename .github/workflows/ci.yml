name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Verify proofs
        run: make nix-verify

      - name: Run QEMU tests
        run: make nix-test
